<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>Главный вопрос</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        width: 100%;
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 16px 40px;
        overflow-x: hidden;
      }
      .page4-heading {
        font-size: clamp(20px, 5vw, 28px);
        font-weight: 600;
        text-align: center;
        margin-bottom: 40px;
        max-width: 420px;
        line-height: 1.35;
      }
      .page4-btn {
        display: inline-block;
        padding: 14px 24px;
        border-radius: 999px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        background: linear-gradient(135deg, #ff6f91, #b28dff);
        color: #fff;
        border: none;
        cursor: pointer;
        transition: box-shadow 0.2s;
      }
      .page4-btn:hover {
        box-shadow: 0 8px 24px rgba(255, 111, 145, 0.4);
      }
    </style>
  </head>
  <body>
    <h1 class="page4-heading">На последок хотелось сказать вот что....</h1>

    <a href="page5.html" class="page4-btn">Что?</a>
  </body>
</html>
